<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maybe This Holi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    overflow:hidden;
    background: linear-gradient(135deg,#ffd6e8,#fff1a8,#cfe9ff,#e6d6ff);
    background-size:300% 300%;
    animation: gradientMove 18s ease infinite;
    color:#333;
    opacity:0;
    animation: pageLoad 1.5s ease forwards;
}

/* Page load intro */
@keyframes pageLoad{
    to{opacity:1;}
}

/* Animated gradient */
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Grain texture */
body::before{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:url('https://www.transparenttextures.com/patterns/asfalt-light.png');
    opacity:0.15;
    pointer-events:none;
}

/* Soft vignette */
body::after{
    content:"";
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    box-shadow:inset 0 0 150px rgba(0,0,0,0.15);
    pointer-events:none;
}

/* Main card */
.container{
    backdrop-filter:blur(12px);
    background:rgba(255,255,255,0.35);
    padding:45px;
    border-radius:22px;
    width:90%;
    max-width:450px;
    box-shadow:0 25px 50px rgba(0,0,0,0.1);
    transform:translateY(20px);
    opacity:0;
    animation: fadeUp 2s ease forwards 0.8s;
}

@keyframes fadeUp{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-weight:400;
    font-size:22px;
    margin-bottom:18px;
}

.subtitle{
    font-size:14px;
    opacity:0.8;
    margin-bottom:25px;
}

input{
    padding:12px 18px;
    border:none;
    border-radius:30px;
    width:80%;
    outline:none;
    text-align:center;
    margin-bottom:15px;
}

button{
    padding:9px 22px;
    border:none;
    border-radius:25px;
    background:#ff8fb1;
    color:white;
    cursor:pointer;
    transition:0.3s ease;
}

button:hover{
    background:#ff5e92;
}

#countdown{
    margin-top:22px;
    font-size:20px;
    font-weight:500;
    display:none;
}

.final-line{
    margin-top:30px;
    font-size:16px;
    opacity:0;
    transition:1.5s;
}
.show{
    opacity:1;
}
</style>
</head>

<body>

<div class="container">
    <h1>Some moments are worth waiting for.</h1>
    <div class="subtitle">Enter gently.</div>

    <input type="password" id="password" placeholder="Enter password">
    <br>
    <button onclick="checkPassword()">Unlock</button>

    <div id="countdown"></div>
    <div class="final-line" id="finalLine">
        Maybe this Holi… something quietly changes.
    </div>
</div>

<audio id="ambient" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0e6dc6fa5f.mp3?filename=wind-chimes-110463.mp3" type="audio/mp3">
</audio>

<script>
function checkPassword(){
    const input = document.getElementById("password").value.trim().toLowerCase();
    if(input === "maybethisholi"){
        document.getElementById("countdown").style.display="block";
        startCountdown();
    }else{
        alert("Not yet.");
    }
}

function startCountdown(){
    const targetDate = new Date("March 4, 2026 00:00:00").getTime();
    const countdown = document.getElementById("countdown");

    const interval = setInterval(()=>{
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance/(1000*60*60*24));
        const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
        const minutes = Math.floor((distance%(1000*60*60))/(1000*60));

        countdown.innerHTML = days + "d " + hours + "h " + minutes + "m";

        if(distance < 0){
            clearInterval(interval);
            countdown.innerHTML = "It's time.";
            document.getElementById("finalLine").classList.add("show");

            setTimeout(()=>{
                document.body.style.transition="opacity 1.5s ease";
                document.body.style.opacity="0";
            },2000);

            setTimeout(()=>{
                window.location.href="holi.html";
            },3500);
        }
    },1000);
}

/* Ambient auto fade-in */
window.addEventListener("load",()=>{
    const audio=document.getElementById("ambient");
    setTimeout(()=>{
        audio.volume=0;
        audio.play();
        let fade=setInterval(()=>{
            if(audio.volume<0.4){
                audio.volume+=0.02;
            }else{
                clearInterval(fade);
            }
        },300);
    },2500);
});
</script>

</body>
</html>
